<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Su Ürünleri AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startScreen">
        <h1>Su Ürünleri AR</h1>
        <p>Deneyimi başlatmak için aşağıdaki butona tıkla.</p>
        <button id="startBtn">Kamerayı Başlat</button>
    </div>

    <div id="fishPopup" class="hidden">
        <div class="popup-card">
            <img id="fishImage" src="" alt="Balık">
            <h2 id="fishName"></h2>
            <p id="fishDesc"></p>
            <div class="details">
                <p><strong>Boyut:</strong> <span id="fishSize"></span></p>
                <p><strong>Habitat:</strong> <span id="fishHabitat"></span></p>
            </div>
            <button id="closeBtn">Kapat</button>
        </div>
    </div>

    <button id="exit3DBtn" class="hidden">✖</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/target/targets.mind; autoStart: false;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelYunus" src="./assets/models/uploads_files_2372056_carp_with_armature.glb"></a-asset-item>
            <img id="waterTexture" src="https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/waternormals.jpg">
        </a-assets>

        <a-camera id="mainCamera" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="levrekTarget" mindar-image-target="targetIndex: 0">
            <a-gltf-model id="3d-levrek" position="0 0 0" scale="0.4 0.4 0.4" visible="false"></a-gltf-model>
        </a-entity>

        <a-entity id="balonTarget" mindar-image-target="targetIndex: 1">
            <a-gltf-model id="3d-balon" position="0 0 0" scale="0.4 0.4 0.4" visible="false"></a-gltf-model>
        </a-entity>

        <a-entity id="kopekTarget" mindar-image-target="targetIndex: 2">
            <a-gltf-model id="3d-kopek" position="0 0 0" scale="0.4 0.4 0.4" visible="false"></a-gltf-model>
        </a-entity>

        <a-entity id="yunusTarget" mindar-image-target="targetIndex: 3">
            
            <a-entity id="yunusGroup">
                <a-circle id="waterSurface" position="0 -0.4 0" rotation="-90 0 0" radius="1.0" src="#waterTexture" material="opacity: 0.7; transparent: true;" visible="false"></a-circle>
                <a-gltf-model id="3d-yunus" src="#modelYunus" position="0 0 0" scale="0.4 0.4 0.4" animation-mixer visible="false"></a-gltf-model>
            </a-entity>
            
        </a-entity>
    </a-scene>

    <script src="app.js"></script>
</body>
</html>
