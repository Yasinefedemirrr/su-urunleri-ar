<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Su Ürünleri AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Başlangıç Ekranı -->
  <div id="startScreen">
    <h1>Su Ürünleri AR</h1>
    <button id="startBtn">Kamerayı Başlat</button>
  </div>

  <!-- POPUP -->
  <div id="fishPopup" class="hidden">

    <div class="popup-card">

      <img id="fishImage" src="./assets/images/levrek.jpg" alt="Levrek">

      <h2 id="fishName">Levrek</h2>

      <p id="fishDesc">
        Levrek Ege Denizi’nde yaşayan etçil bir balıktır.
      </p>

      <p><strong>Boyut:</strong> 40 cm</p>

      <p><strong>Habitat:</strong> Ege Denizi</p>

      <button id="closeBtn">Kapat</button>

    </div>

  </div>

  <!-- AR SAHNESİ -->
  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- TEST KUTUSU -->
      <a-box
        position="0 0 0"
        color="blue"
        depth="0.5"
        height="0.5"
        width="0.5">
      </a-box>

    </a-entity>

  </a-scene>

  <script src="app.js"></script>

</body>

</html>
