<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Su Ürünleri AR</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- BAŞLANGIÇ EKRANI -->

  <div id="startScreen">

    <h1>Su Ürünleri AR</h1>

    <button id="startBtn">
      Kamerayı Başlat
    </button>

  </div>

  <!-- POPUP -->

  <div id="fishPopup" class="hidden">

    <div class="popup-card">

      <img
        id="fishImage"
        src=""
        alt=""
      />

      <h2 id="fishName"></h2>

      <p id="fishDesc"></p>

      <p>
        <strong>Boyut:</strong>
        <span id="fishSize"></span>
      </p>

      <p>
        <strong>Habitat:</strong>
        <span id="fishHabitat"></span>
      </p>

      <button id="closeBtn">
        Kapat
      </button>

    </div>

  </div>

  <!-- AR SAHNESİ -->

  <a-scene

    mindar-image="imageTargetSrc: ./assets/targets/targets.mind;"

    color-space="sRGB"

    renderer="colorManagement: true;"

    vr-mode-ui="enabled: false"

    device-orientation-permission-ui="enabled: false"

    embedded

  >

    <!-- KAMERA -->

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    >
    </a-camera>

    <!-- TARGET 0 -->

    <a-entity mindar-image-target="targetIndex: 0">

      <a-box
        position="0 0 0"
        color="blue"
        depth="0.5"
        height="0.5"
        width="0.5"
      >
      </a-box>

    </a-entity>

    <!-- TARGET 1 -->

    <a-entity mindar-image-target="targetIndex: 1">

      <a-box
        position="0 0 0"
        color="red"
        depth="0.5"
        height="0.5"
        width="0.5"
      >
      </a-box>

    </a-entity>

    <!-- TARGET 2 -->

    <a-entity mindar-image-target="targetIndex: 2">

      <a-box
        position="0 0 0"
        color="green"
        depth="0.5"
        height="0.5"
        width="0.5"
      >
      </a-box>

    </a-entity>

  </a-scene>

  <script src="app.js"></script>

</body>

</html>
